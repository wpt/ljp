version: 2

builds:
  - main: ./cmd/ljp/
    binary: ljp
    env:
      - CGO_ENABLED=0
    # Stamp the version into the binary so `ljp --version` reports the tag.
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - format_overrides:
      - goos: windows
        formats: [zip]

changelog:
  sort: asc
